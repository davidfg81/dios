function migrate(d){
 const f=freshData(); const out=Object.assign({},f,d);
 out.version=VERSION;
 out.settings=Object.assign({},f.settings,d.settings||{});
 Object.keys(out.manual||{}).forEach(k=>{const m=out.manual[k];if(m&&m.todayAction!==undefined){m.todayAdvice=m.todayAdvice??m.todayAction;delete m.todayAction;}});
 ["watchlist","aiReports","consensus","consensusHistory","scenarios","metrics","graph","majorEvents","validation","decisionLog"].forEach(k=>{if(out[k]==null)out[k]=f[k];});
 if(!out.quoteMeta)out.quoteMeta={lastTW:null,lastFX:null};
 return out;
}

/* ---------- Store ---------- */
const Store={
 data:null,
 load(){try{const r=localStorage.getItem(KEY);this.data=r?migrate(JSON.parse(r)):freshData();}catch(e){this.data=freshData();}this.persist();},
 persist(){try{localStorage.setItem(KEY,JSON.stringify(this.data));}catch(e){toast("儲存失敗:"+e.message);}},
 log(ticker,field,oldVal,newVal,reason){this.data.decisionLog.unshift({ts:now(),ticker,field,oldVal:oldVal==null?"Data Missing":String(oldVal),newVal:newVal==null?"Data Missing":String(newVal),reason:reason||"手動更新"});}
};

/* ---------- Repository:所有寫入的唯一入口 ---------- */
const Repo={
 setPosition(ticker,field,value,reason){
  const p=Store.data.positions.find(x=>x.ticker===ticker);if(!p)return;
  if(String(p[field])===String(value))return;
  Store.log(ticker,field,p[field],value,reason);
  p[field]=value;p.lastUpdated=today();Store.persist();render();toast(ticker+" 已更新並記錄");
 },
 setManual(ticker,field,value,reason){
  const m=Store.data.manual[ticker];if(!m)return;
  if(String(m[field])===String(value))return;
  Store.log(ticker,"手冊/"+field,m[field],value,reason||"手冊調整");
  m[field]=value;m.lastChange=today()+" "+(reason||"手動調整");Store.persist();render();toast(ticker+" 手冊已更新");
 },
 setSetting(k,v,label){
  Store.log("SYSTEM",label||k,Store.data.settings[k],v,"設定更新");
  Store.data.settings[k]=v;Store.persist();render();
 },
 applyQuotes(quotes,fxRate,srcName){ // quotes:[{ticker,price,date}]
  let n=0;
  quotes.forEach(q=>{
   const p=Store.data.positions.find(x=>x.ticker===q.ticker);if(!p)return;
   if(q.price!=null&&q.price!==p.currentPrice){Store.log(q.ticker,"現價",p.currentPrice,q.price,srcName+" 報價("+q.date+")");p.currentPrice=q.price;p.lastUpdated=q.date;n++;}
  });
  if(fxRate!=null&&fxRate!==Store.data.settings.fxUSDTWD){Store.log("SYSTEM","USD/TWD",Store.data.settings.fxUSDTWD,fxRate,srcName+" 匯率");Store.data.settings.fxUSDTWD=fxRate;}
  Store.data.quoteMeta.lastTW=now();if(fxRate!=null)Store.data.quoteMeta.lastFX=now();
  Store.persist();render();
  return n;
 }
};

 async get(params){
  const token=Store.data.settings.finmindToken;
  const u=new URLSearchParams(params);
  const opt=token?{headers:{Authorization:"Bearer "+token}}:{};
  const r=await fetch(this.base+"?"+u.toString(),opt);
  if(!r.ok)throw new Error("HTTP "+r.status);
  const j=await r.json();
  return j.data||[];
 },
 async twClose(id){
  const start=new Date(Date.now()-14*864e5).toISOString().slice(0,10);
  const rows=await this.get({dataset:"TaiwanStockPrice",data_id:id,start_date:start});
  if(!rows.length)return null;
  const last=rows[rows.length-1];
  return {ticker:id,price:last.close,date:last.date};
 },
 async fxUSD(){
  const start=new Date(Date.now()-14*864e5).toISOString().slice(0,10);
  const rows=await this.get({dataset:"TaiwanExchangeRate",data_id:"USD",start_date:start});
  if(!rows.length)return null;
  const last=rows[rows.length-1];
  const buy=parseFloat(last.spot_buy),sell=parseFloat(last.spot_sell);
  const mid=(buy>0&&sell>0)?(buy+sell)/2:(sell>0?sell:buy);
  return mid>0?Math.round(mid*1000)/1000:null;
 }
};

/* ---------- 一鍵更新報價 ---------- */
async function updateQuotes(){
 const btn=document.getElementById("updbtn");if(btn){btn.disabled=true;btn.textContent="更新中…";}
 const tw=Store.data.positions.filter(p=>p.market==="TW").map(p=>p.ticker);
 const results=[],fails=[];
 try{
  const settled=await Promise.allSettled(tw.map(id=>FinMind.twClose(id)));
  settled.forEach((s,i)=>{if(s.status==="fulfilled"&&s.value)results.push(s.value);else fails.push(tw[i]);});
  let fx=null;
  try{fx=await FinMind.fxUSD();}catch(e){fails.push("匯率");}
  const n=Repo.applyQuotes(results,fx,"FinMind");
  Store.log("SYSTEM","報價更新","-","台股 "+results.length+"/"+tw.length+" 檔"+(fx!=null?",匯率 "+fx:"")+(fails.length?",失敗:"+fails.join("、"):""),"一鍵更新(FinMind)");
  Store.persist();
  toast("完成:台股更新 "+results.length+" 檔"+(fx!=null?" + 匯率":"")+(fails.length?";失敗:"+fails.join("、"):"")+"。美股待 Stage 2。");
 }catch(e){toast("更新失敗:"+e.message);}
 finally{if(btn){btn.disabled=false;btn.textContent="⟳ 更新報價";}render();}
}

/* ---------- 計算 ---------- */
function calc(p){
 const fx=Store.data.settings.fxUSDTWD, price=p.currentPrice;
 const mv=price!=null?price*p.shares:null;
 const pl=(price!=null&&p.costCurrency===p.quoteCurrency)?(price-p.avgCost)*p.shares:null;
 const plPct=pl!=null?((price-p.avgCost)/p.avgCost)*100:null;
 const toTWD=v=>v==null?null:(p.quoteCurrency==="TWD"?v:(fx!=null?v*fx:null));
 return {mv,pl,plPct,mvTWD:toTWD(mv),plTWD:toTWD(pl)};
}

function promptEdit(ticker,field,isManual,isNum){
 const d=Store.data;
 const cur=isManual?d.manual[ticker][field]:d.positions.find(x=>x.ticker===ticker)[field];
 const v=prompt(ticker+" · "+field+(isNum?"(數字)":""),cur??"");
 if(v===null)return;
 const reason=prompt("修改原因(選填,寫入 Decision Log)","")||undefined;
 let val=v.trim()===""?null:(isNum?parseFloat(v):v.trim());
 if(isNum&&val!=null&&isNaN(val)){toast("需輸入數字");return;}
 if(isManual)Repo.setManual(ticker,field,val,reason);else Repo.setPosition(ticker,field,val,reason);
}

function doImport(){
 try{
  const o=migrate(JSON.parse(document.getElementById("iotext").value));
  o.decisionLog.unshift({ts:now(),ticker:"SYSTEM",field:"import",oldVal:"-",newVal:"匯入 "+o.positions.length+" 檔持股",reason:"JSON 匯入覆蓋(備份/搬家)"});
