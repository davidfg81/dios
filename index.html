<style>
:root{--bg:#020617;--panel:#0f172a;--line:#1e293b;--txt:#e2e8f0;--dim:#64748b;--dimmer:#475569;--amber:#fbbf24;--amber-d:#d97706;--up:#f87171;--down:#34d399;--rose:#fb7185;--sky:#38bdf8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:ui-sans-serif,system-ui,"Noto Sans TC",sans-serif;font-size:14px}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}
header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line)}
.hrow{display:flex;align-items:center;gap:8px;padding:10px 14px 6px}
.logo{font-weight:800;color:var(--amber);letter-spacing:4px;font-family:ui-monospace,monospace}
.ver{color:var(--dimmer);font-size:11px;font-family:ui-monospace,monospace}
.hbtns{margin-left:auto;display:flex;gap:6px}
.chip{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:4px 8px;font-size:11px;font-family:ui-monospace,monospace}
nav{display:flex;overflow-x:auto;padding:0 8px;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:8px 10px;font-size:12px;font-family:ui-monospace,monospace;white-space:nowrap}
nav button.on{color:var(--amber);border-bottom-color:var(--amber)}
main{padding:12px;max-width:960px;margin:0 auto;padding-bottom:90px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.card.warn{border-color:#92600e}
.clabel{font-size:11px;letter-spacing:2px;color:var(--dim);font-family:ui-monospace,monospace;margin-bottom:8px}
.card.warn .clabel{color:var(--amber)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid2 .card{margin-bottom:0}
.big{font-size:19px;font-family:ui-monospace,monospace}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--txt)}
.missing{font-size:11px;padding:1px 6px;border:1px solid #92600e;border-radius:4px;color:#f59e0b;background:#451a03;white-space:nowrap}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;color:var(--dim);font-family:ui-monospace,monospace;text-align:left;padding:8px 6px;background:var(--panel)}
td{padding:8px 6px;border-top:1px solid var(--line)}
.twrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-bottom:12px}
.tk{font-family:ui-monospace,monospace;color:#f1f5f9}
.sub{font-size:11px;color:var(--dim)}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;background:#1e293b}
.tag.core{color:var(--amber)}.tag.sat{color:var(--sky)}.tag.tac{color:#c4b5fd}.tag.exitc{color:var(--rose)}
.st{font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid var(--dimmer);color:var(--dim)}
.st.tp{border-color:#92600e;color:var(--amber)}.st.exit{border-color:#9f1239;color:var(--rose)}
.btn{background:var(--amber-d);color:var(--bg);border:none;border-radius:6px;padding:8px 14px;font-weight:700;font-size:13px}
.btn.sec{background:#1e293b;color:var(--txt);border:1px solid var(--line)}
.btn:disabled{background:#1e293b;color:var(--dimmer)}
.row{display:flex;align-items:center;gap:8px;padding:4px 2px;width:100%;background:none;border:none;color:var(--txt);text-align:left;font-size:13px}
.bar{flex:1;height:5px;background:#1e293b;border-radius:3px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--amber)}
.fitem{padding:3px 0}
.flabel{font-size:11px;color:var(--dimmer);font-family:ui-monospace,monospace;margin-bottom:2px}
.editv{background:none;border:none;color:var(--txt);font-size:13px;text-align:left;padding:0;font-family:inherit}
input,textarea,select{background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:6px 8px;font-size:13px;font-family:inherit;width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--amber-d)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:40;display:flex;align-items:flex-end;justify-content:center;padding:12px}
.mbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;width:100%;max-width:640px;padding:14px;max-height:85vh;overflow-y:auto}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--amber-d);color:#fde68a;font-size:12px;padding:8px 14px;border-radius:8px;z-index:50;display:none;max-width:88vw}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.logitem{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:6px}
.stage2{color:var(--dimmer);text-align:center;padding:60px 10px;font-size:13px;line-height:2}
.back{background:none;border:none;color:var(--dim);font-size:12px;font-family:ui-monospace,monospace;padding:0;margin-bottom:8px}
h2{font-size:18px;margin:4px 0;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}

/* ---------- 費用引擎(v3.3):國泰證券牌價,設定頁可調 ---------- */
function feeDefaults(){return {twFeeRate:0.001425,twFeeMin:20,twTaxStock:0.003,twTaxETF:0.001,usStockFeeRate:0.0008,usEtfFlat:3,usFeeMin:0,usSecRate:0.0000278};}
const US_ETF_SET=new Set(["KMEM","SPCX","SMH","QQQ","VOO","SPY","SOXX","IVV","VTI","TLT","XLK"]);
function isETFof(p){return p.market==="TW"?/^00/.test(p.ticker):(US_ETF_SET.has(p.ticker)||/ETF/i.test(p.sector||""));}
function calcFees(p,side,shares,price){
 const f=Object.assign(feeDefaults(),Store.data.settings.fees||{});
 const gross=shares*price;let fee=0,tax=0,sec=0;
 if(p.market==="TW"){
  fee=Math.max(Math.round(gross*f.twFeeRate),f.twFeeMin);
  if(side==="Sell")tax=Math.round(gross*(isETFof(p)?f.twTaxETF:f.twTaxStock));
 }else{
  fee=isETFof(p)?f.usEtfFlat:Math.max(gross*f.usStockFeeRate,f.usFeeMin);
  fee=Math.round(fee*100)/100;
  if(side==="Sell")sec=Math.round(gross*f.usSecRate*100)/100;
 }
 const total=Math.round((fee+tax+sec)*100)/100;
 const netCash=side==="Buy"?-(gross+fee):(gross-total); // 報價幣別
 return {gross:Math.round(gross*100)/100,fee,tax,sec,total,netCash:Math.round(netCash*100)/100};
}
/* ---------- 現金連動(v3.3):TWD/USD 雙池;台幣複委託 L607568 以匯率換算動 TWD 池 ---------- */
function applyCash(p,deltaQuoteCcy,tag){
 const s=Store.data.settings;const dp2=v=>Math.round(v*100)/100;
 if(p.acctId==="G552118"){
  if(s.cashUSD==null){Store.log(p.ticker,"現金連動","-","略過:USD 現金未設定(Risk 頁可設)",tag);return;}
  const old=s.cashUSD;s.cashUSD=dp2(s.cashUSD+deltaQuoteCcy);Store.log("SYSTEM","現金USD",fmt(old,2),fmt(s.cashUSD,2),tag);
 }else if(p.acctId==="L607568"){
  const fx=s.fxUSDTWD;
  if(fx==null){Store.log(p.ticker,"現金連動","-","略過:缺 USD/TWD 匯率,無法換算台幣扣款;請補匯率後至 Risk 頁校正現金",tag);toast("⚠ 缺匯率,"+p.ticker+" 現金未連動,請補匯率後校正");return;}
  if(s.cashTWD==null){Store.log(p.ticker,"現金連動","-","略過:TWD 現金未設定(Risk 頁可設)",tag);return;}
  const old=s.cashTWD;s.cashTWD=Math.round(s.cashTWD+deltaQuoteCcy*fx);Store.log("SYSTEM","現金TWD",fmt(old,0),fmt(s.cashTWD,0),tag+"(USD "+fmt(deltaQuoteCcy,2)+" × 匯率 "+fx+")");
 }else{
  if(s.cashTWD==null){Store.log(p.ticker,"現金連動","-","略過:TWD 現金未設定(Risk 頁可設)",tag);return;}
  const old=s.cashTWD;s.cashTWD=Math.round(s.cashTWD+deltaQuoteCcy);Store.log("SYSTEM","現金TWD",fmt(old,0),fmt(s.cashTWD,0),tag);
 }
}

/* ---------- 出清 → 自動轉回 Watchlist(v3.3) ---------- */
function closePosition(p,reason){

 }

function migrate(d){
 const f=freshData(); const out=Object.assign({},f,d);
 out.version=VERSION;
 out.costSchema=(d&&typeof d.costSchema==="number")?d.costSchema:0; // 遷移旗標只認「進場資料」自身,不吃 freshData 預設,確保舊資料必經修復
 out.settings=Object.assign({},f.settings,d.settings||{});
 out.settings.fees=Object.assign(feeDefaults(),(d.settings&&d.settings.fees)||{});
 (out.positions||[]).forEach(p=>{
  if(!p.acctId)p.acctId=(p.broker||"").split(" ").pop()||"舊帳戶";
  if(!p.id||p.id.indexOf("|")<0)p.id=p.acctId+"|"+p.market+"|"+p.ticker;
  if(p.realizedPL===undefined)p.realizedPL=null;
  if(!p.valuationCurrency)p.valuationCurrency=p.quoteCurrency;
  if(p.totalCostFixed==null)p.totalCostFixed=(p.avgCost||0)*(p.shares||0);
  if(!p.priceUpdatedAt)p.priceUpdatedAt=null;
 });
 // ── V14 成本資料遷移(costSchema 2)──
 // 舊資料的 totalCostFixed 可能:(a)幣別混雜(L607568 種子為 TWD、交易疊加 USD)、(b)與 avgCost×shares 脫鉤。
 // 對每個部位驗證 |totalCostFixed − avgCost×shares| 容差;不符者依優先序重建,並記錄 migration log。
 // 舊雲端/舊備份資料一律經本 migrate() 進場,重建後 costSchema 標記防止舊值覆蓋修正結果。
 // 交易紀錄去重:同 txid 只保留一筆;無 txid 者補發(歷史紀錄不重放,不會重複套用)。
 (function(){
  const seen=new Set();
  out.transactions=(out.transactions||[]).filter(t=>{
   if(!t.txid)t.txid="mig-"+[t.ts,t.id,t.side,t.shares,t.price].join("|");
   if(seen.has(t.txid))return false;seen.add(t.txid);return true;
  });
 })();
 if(out.costSchema!==COST_SCHEMA){
  const migLog=[];
  (out.positions||[]).forEach(p=>{
   const q=p.shares||0,avg=p.avgCost||0,tc=p.totalCostFixed;
   const expected=avg*q;
   const tol=Math.max(0.01,Math.abs(expected)*0.005); // 0.5% 或 0.01 報價幣別
   if(q===0){if(tc!==0){migLog.push([p,"股數0成本歸零",tc,0]);p.totalCostFixed=0;p.avgCost=0;}return;}
   if(typeof tc==="number"&&isFinite(tc)&&Math.abs(tc-expected)<=tol){syncDerivedCost(p);return;} // 已一致:僅重推導精度
   // 第一優先:交易紀錄完整(自 0 重放後股數吻合)→ 由交易重建
   const txs=(out.transactions||[]).filter(t=>t.id===p.id).slice().reverse(); // 舊→新
   let rq=0,rc=0,ok=txs.length>0;
   txs.forEach(t=>{
    const f=(t.fee||0),x=(t.tax||0),s=(t.sec||0);
    if(t.side==="Buy"){rc+=t.shares*t.price+f;rq+=t.shares;}
    else{if(rq<=0||t.shares>rq){ok=false;return;}rc-=(rc/rq)*t.shares;rq-=t.shares;}
   });
   if(ok&&rq===q&&rq>0){
    migLog.push([p,"由交易紀錄重建("+txs.length+"筆)",tc,rc]);
    p.totalCostFixed=rc;syncDerivedCost(p);return;
   }
   // 第二優先:以可靠的 shares × avgCost 重建(avgCost 為使用者對帳過的均價,報價幣別)
   migLog.push([p,"以 股數×均價 重建(交易史不完整"+(txs.length?";重放股數 "+rq+"≠"+q:";無交易紀錄")+")",tc,expected]);
   p.totalCostFixed=expected;syncDerivedCost(p);
  });
  out.costSchema=COST_SCHEMA;
  if(migLog.length){
   out.decisionLog=out.decisionLog||[];
   migLog.forEach(([p,how,oldV,newV])=>out.decisionLog.unshift({ts:now(),ticker:p.ticker,field:"成本遷移 V14("+p.broker+")",
    oldVal:"totalCost "+(oldV==null?"缺":fmt(oldV,2)),newVal:"totalCost "+fmt(newV,2)+" "+p.quoteCurrency+"(含費,報價幣別)",
    reason:how+";修正舊版幣別混雜/成本脫鉤,估值一律讀取時換匯"}));
  }
 }else{
  (out.positions||[]).forEach(p=>syncDerivedCost(p)); // 已遷移:僅確保推導欄位一致
 }
 Object.keys(out.manual||{}).forEach(k=>{const m=out.manual[k];if(m&&m.todayAction!==undefined){m.todayAdvice=m.todayAdvice??m.todayAction;delete m.todayAction;}});
 ["watchlist","aiReports","consensus","consensusHistory","scenarios","metrics","graph","majorEvents","validation","decisionLog","transactions","adoptedPlans","pendingDecisions"].forEach(k=>{if(out[k]==null)out[k]=f[k]||[];});
 if(out.integrated==null)out.integrated={};
 if(!out.quoteMeta)out.quoteMeta={lastTW:null,quoteDateTW:null,lastFX:null};
 return out;
}

const Store={
 data:null,
 load(){try{const r=localStorage.getItem(KEY);this.data=migrate(r?JSON.parse(r):freshData());}catch(e){this.data=migrate(freshData());}this.persist();}, // V14:全部入口一律經 migrate(含全新種子),確保推導欄位一致
 persist(){try{localStorage.setItem(KEY,JSON.stringify(this.data));}catch(e){toast("儲存失敗:"+e.message);}},
 log(ticker,field,oldVal,newVal,reason){this.data.decisionLog.unshift({ts:now(),ticker,field,oldVal:oldVal==null?"Data Missing":String(oldVal),newVal:newVal==null?"Data Missing":String(newVal),reason:reason||"手動更新"});}
};
const findPos=id=>Store.data.positions.find(x=>x.id===id);

/* ---------- Repository ---------- */
const Repo={
 setPosition(id,field,value,reason){
  const p=findPos(id);if(!p)return;
  if(String(p[field])===String(value))return;
  Store.log(p.ticker,field+"("+p.broker+")",p[field],value,reason);
  p[field]=value;
  if(field==="shares"||field==="avgCost"){ // V14:直接編輯股數/均價 ⇒ 成本基礎同步重建,三欄位不得脫鉤
   const q=Math.max(0,+p.shares||0),avg=Math.max(0,+p.avgCost||0);
   const old=p.totalCostFixed;
   p.shares=q;p.totalCostFixed=q>0?avg*q:0;syncDerivedCost(p);
   Store.log(p.ticker,"成本連動("+p.broker+")","totalCost "+fmt(old,2),"totalCost "+fmt(p.totalCostFixed,2)+" "+p.quoteCurrency,"手動編輯 "+field+" 後自動重算(含費均價×股數)");
   if(!assertHolding(p,"setPosition/"+field))return;
  }
  p.lastUpdated=today();Store.persist();render();toast(p.ticker+" 已更新並記錄");
 },
 setManual(ticker,field,value,reason){
  const m=Store.data.manual[ticker];if(!m)return;
  if(String(m[field])===String(value))return;
  Store.log(ticker,"手冊/"+field,m[field],value,reason||"手冊調整");
  m[field]=value;m.lastChange=today()+" "+(reason||"手動調整");Store.persist();render();toast(ticker+" 手冊已更新");
 },
 setSetting(k,v,label){Store.log("SYSTEM",label||k,Store.data.settings[k],v,"設定更新");Store.data.settings[k]=v;Store.persist();render();},
 addTransaction(id,side,shares,price,note){ // v3.3 全連動:Append + 國泰費用 + 現金雙池 + 出清轉觀察
  const p=findPos(id);if(!p)return toast("找不到部位");
  shares=Math.abs(shares);
  const F=calcFees(p,side,shares,price);
  const tag="交易:"+(side==="Buy"?"買":"賣")+" "+shares+" 股 @ "+price+"("+p.broker+")";
  const tx={ts:today(),txid:Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8),id,ticker:p.ticker,side,shares,price,fee:F.fee,tax:F.tax,sec:F.sec,note:note||"",realized:null};
  if(!assertHolding(p,"preTx/"+side))return; // 交易前置檢查:成本基礎已損壞則擋下,不得靜默修復後照常交易
  syncDerivedCost(p); // 通過檢查後統一推導精度
  if(side==="Buy"){
   // V14:原子化更新——totalCostFixed(報價幣別,含費,原始精度)為唯一資料源,avgCost 由其推導
   const prevSh=p.shares,prevAvg=p.avgCost;
   const tradeTotalCost=F.gross+F.fee; // 本筆買進總成本 = 價金 + 手續費(報價幣別)
   p.shares=prevSh+shares;
   p.totalCostFixed=(p.totalCostFixed||0)+tradeTotalCost;
   syncDerivedCost(p); // avgCost = totalCostFixed / shares(含費均價,比照券商帳面)
   Store.log(p.ticker,"買進("+p.broker+")",prevSh+"股@"+fmt(prevAvg,4)+"(總成本 "+fmt(prevAvg*prevSh,2)+")",p.shares+"股@"+fmt(p.avgCost,4)+"(總成本 "+fmt(p.totalCostFixed,2)+" "+p.quoteCurrency+")",tag+";手續費 "+F.fee+" 已計入成本");
  }else{
   if(shares>p.shares)return toast("賣出股數超過持有("+p.shares+")");
   // V14 移動平均成本法:配置成本自 totalCostFixed 扣除;賣出收入不是成本、不得直接扣減
   const avgRaw=p.avgCost; // = totalCostFixed/shares(原始精度)
   const costAllocated=avgRaw*shares;
   const proceedsAfterFee=shares*price-F.total;
   tx.realized=Math.round((proceedsAfterFee-costAllocated)*100)/100; // 已實現=扣費淨收入−配置成本
   p.realizedPL=Math.round(((p.realizedPL||0)+tx.realized)*100)/100;
   const remain=p.shares-shares;
   p.shares=remain;
   p.totalCostFixed=remain>0?(p.totalCostFixed-costAllocated):0; // 出清→成本歸零,不留幽靈成本;已實現保留
   syncDerivedCost(p);
   Store.log(p.ticker,"賣出("+p.broker+")",(remain+shares)+"股",remain+"股;配置成本 "+fmt(costAllocated,2)+",扣費淨收入 "+fmt(proceedsAfterFee,2)+"(手續 "+F.fee+(F.tax?"+稅 "+F.tax:"")+(F.sec?"+SEC "+F.sec:"")+"),淨已實現 "+(tx.realized>0?"+":"")+fmt(tx.realized,2)+" "+p.quoteCurrency,tag);
  }
  if(!assertHolding(p,"addTransaction/"+side))return; // 檢查失敗:不寫入、不顯示看似合理的結果
  p.lastUpdated=today();Store.data.transactions.unshift(tx);

/* ---------- 計算(V14 唯一資料源) ----------
 契約:p.totalCostFixed = 該部位「報價幣別」含費總成本(原始精度,不預先四捨五入);
      p.avgCost = totalCostFixed / shares 的推導值(只由 syncDerivedCost 寫入);
      估值幣別(TWD/USD)一律在讀取時由 deriveHoldingMetrics 以當前匯率換算;
      損益率一律以報價幣別計算,避免重複換匯誤差。
 Portfolio / Dashboard / Risk / Graph / Detail / Formats 全部只讀 deriveHoldingMetrics 結果。 */
function syncDerivedCost(p){ // 每次成本基礎變動後呼叫:推導 avgCost,並保證 qty=0 ⇒ cost=0
 if(!(p.shares>0)){p.shares=Math.max(0,p.shares||0);p.totalCostFixed=0;p.avgCost=0;return p;}
 if(p.totalCostFixed==null||isNaN(p.totalCostFixed))p.totalCostFixed=(p.avgCost||0)*p.shares;
 p.avgCost=p.totalCostFixed/p.shares; // 原始精度,顯示時才四捨五入
 return p;
}
function validateHolding(p,fx,stage){ // 強制一致性檢查:回傳問題陣列,呼叫端決定處置
 const errs=[],TOL_USD=0.0001,TOL_PCT=0.01;
 const bad=v=>v==null||typeof v!=="number"||isNaN(v)||!isFinite(v);
 if(bad(p.shares)||p.shares<0)errs.push("shares 非法:"+p.shares);
 if(bad(p.totalCostFixed))errs.push("totalCostFixed 非法:"+p.totalCostFixed);
 if(bad(p.avgCost))errs.push("avgCost 非法:"+p.avgCost);
 if(!errs.length){
  if(p.shares===0&&Math.abs(p.totalCostFixed)>TOL_USD)errs.push("股數 0 但 totalCostFixed="+p.totalCostFixed+"(幽靈成本)");
  if(p.shares>0&&Math.abs(p.totalCostFixed-p.avgCost*p.shares)>Math.max(TOL_USD,Math.abs(p.totalCostFixed)*TOL_PCT/100))
   errs.push("totalCostFixed("+p.totalCostFixed+") ≠ avgCost×shares("+(p.avgCost*p.shares)+")");
 }
 if(errs.length)console.error("[DIOS invariant] "+(stage||"")+" "+p.id,errs);
 return errs;
}
function assertHolding(p,stage){ // 寫入前檢查:失敗時不得靜默,修 UI 可見
 const errs=validateHolding(p,Store.data&&Store.data.settings.fxUSDTWD,stage);
 if(errs.length){toast("⚠ 成本資料不一致("+p.ticker+" "+(stage||"")+"),請至 Log 頁檢查:"+errs[0]);
  Store.log(p.ticker,"一致性檢查失敗("+(stage||"")+")","-",errs.join(";"),"invariant validation");}
 return !errs.length;
}
function deriveHoldingMetrics(p,fxOverride){ // 中央推導:所有頁面唯一讀取入口
 const fx=fxOverride!=null?fxOverride:Store.data.settings.fxUSDTWD;
 const price=p.currentPrice;
 const needFx=p.quoteCurrency==="USD"&&p.valuationCurrency==="TWD"; // 台幣複委託 L607568
 const k=needFx?(fx!=null?fx:null):1; // 報價幣別→估值幣別係數
 const totalCostQuote=p.totalCostFixed!=null?p.totalCostFixed:(p.avgCost*p.shares); // 報價幣別成本
 const mvQuote=price!=null?price*p.shares:null;                                      // 報價幣別市值
 const plQuote=mvQuote!=null?mvQuote-totalCostQuote:null;                            // 報價幣別未實現
 const plPct=(plQuote!=null&&totalCostQuote>0)?plQuote/totalCostQuote*100:null;      // 損益率:報價幣別直算
 const value=mvQuote==null?null:(k!=null?mvQuote*k:null);        // 估值幣別現值
 const cost=k!=null?totalCostQuote*k:null;                       // 估值幣別成本
 const pl=(value!=null&&cost!=null)?value-cost:null;             // 估值幣別未實現
 const toTWD=v=>v==null?null:(p.valuationCurrency==="TWD"?v:(fx!=null?v*fx:null));
 return {mv:mvQuote,mvQuote,totalCostQuote,plQuote,value,cost,pl,plPct,mvTWD:toTWD(value),plTWD:toTWD(pl),costTWD:toTWD(cost)};
}
function calc(p){return deriveHoldingMetrics(p);} // 舊呼叫點相容包裝
function aggregates(){ // 同 ticker 跨帳戶合計
 const g={};
 Store.data.positions.forEach(p=>{
  g[p.ticker]=g[p.ticker]||{ticker:p.ticker,shares:0,cost:0,accts:0};
  g[p.ticker].shares+=p.shares;g[p.ticker].cost+=p.avgCost*p.shares;g[p.ticker].accts++;
 });
 return Object.values(g).filter(x=>x.accts>1).map(x=>({...x,wavg:x.shares>0?x.cost/x.shares:null}));
}

const PROP_FIELDS=[["buildZone","建倉"],["addZone","加碼"],["tp1","停利1"],["tp2","停利2"],["tp3","停利3"],["buyBack","回補"],["keySupport","支撐"],["keyResistance","壓力"],["invalid","失效"],["catalysts","催化"],["orderSuggestion","掛單"]];
function renderAiCard(p){
 const d=Store.data,rep=d.aiReports[p.ticker]||{},cs=d.consensus[p.ticker],keys=Object.keys(rep);
 if(!keys.length)return"";
 let h='<div class="card"><div class="clabel">▍AI 交叉驗證('+esc(dispName(p.ticker))+')</div>';
 h+=keys.map(s=>{const v=rep[s];
  return '<div style="font-size:13px;padding:3px 0;border-bottom:1px solid var(--line)"><span class="mono" style="color:var(--amber)">'+s+'</span> <span class="mono" style="color:'+actColor(v.action)+'">'+esc(v.action||"—")+'</span>'+(v.health!=null?' <span class="mono">健康'+v.health+'</span>':'')+(v.confidence?' <span style="color:var(--amber)">'+"★".repeat(v.confidence)+'</span>':'')+(v.priceTime?' <span class="sub mono">'+esc(v.priceTime)+'</span>':'')+
  '<div class="sub">'+esc(v.reason||"")+(v.risk?' · 風險:'+esc(v.risk):'')+' ('+esc(v.date||"")+')</div>'+
  (v.prevReview&&v.prevReview.verdict?'<div class="sub" style="color:'+(v.prevReview.verdict==="維持"?"var(--dim)":"var(--amber)")+'">prev_review:'+esc(v.prevReview.verdict)+(v.prevReview.note?' — '+esc(v.prevReview.note):'')+'</div>':'')+
  (v.topRisks&&v.topRisks.length?'<div class="sub">三大風險:'+v.topRisks.map(esc).join(" / ")+'</div>':'')+
  (v.notIncluded&&v.notIncluded.length?'<div class="sub" style="color:var(--dimmer)">未納入:'+v.notIncluded.map(esc).join("<br>未納入:")+'</div>':'')+
  '</div>';}).join("");
 if(cs)h+='<div class="sub" style="margin-top:6px">共識:'+(cs.humanReview?'⚠ Human Review':esc(cs.final))+' '+cs.pct+'%'+(cs.disagreement?' · 分歧:'+esc(cs.disagreement):'')+'</div>';
 h+='</div>';
 // 提案比對表(v3.3:已裁決寫入後收合)
 const props=keys.filter(s=>rep[s].manual);
 const integ=(d.integrated||{})[p.ticker];
 const allHandled=props.length&&props.every(s=>rep[s].handled)&&integ&&integ.applied;
 if(allHandled&&!(window._showProps&&window._showProps[p.ticker])){
  h+='<div class="card"><div class="clabel">▍手冊提案比對</div><div class="sub">✓ 本輪 '+props.length+' 份提案已於 '+esc(integ.applied)+' 裁決並寫入現行手冊。<button class="editv" style="color:var(--sky)" onclick="(window._showProps=window._showProps||{})[\''+p.ticker+'\']=1;render()">展開查看比對</button></div></div>';
  return h;
 }
 if(props.length){
  const m=d.manual[p.ticker]||{};
  h+='<div class="card warn"><div class="clabel">▍手冊提案比對('+props.length+' 份,現行手冊不會被自動覆蓋)</div>';
  h+='<div class="twrap"><table style="min-width:640px;font-size:11px"><thead><tr><th>欄位</th><th>現行手冊</th>'+props.map(s=>'<th>'+esc(s)+'('+esc(rep[s].date||"")+')</th>').join("")+'</tr></thead><tbody>';
  PROP_FIELDS.forEach(([f,label])=>{
   const vals=props.map(s=>rep[s].manual[f]);
   if(m[f]==null&&vals.every(v=>v==null))return;
   const uniq=new Set(vals.filter(v=>v!=null).map(String));
   const diverge=uniq.size>1;
   h+='<tr><td class="sub">'+label+(diverge?' <span style="color:var(--amber)">◆</span>':'')+'</td><td class="sub" style="max-width:150px">'+(m[f]!=null?esc(m[f]):"—")+'</td>'+props.map(s=>{const v=rep[s].manual[f];const changed=v!=null&&String(v)!==String(m[f]);return '<td style="max-width:170px;'+(changed?'color:var(--amber)':'color:var(--dim)')+'">'+(v!=null?esc(v):"—")+'</td>';}).join("")+'</tr>';
  });
  h+='</tbody></table></div>';
  h+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">'+props.map(s=>'<button class="btn sec" onclick="adoptProposal(\''+p.ticker+'\',\''+s+'\')">採納 '+esc(s)+' 版</button>').join("")+'</div>';
  h+='<div class="sub" style="margin-top:6px">◆=三 AI 分歧欄位、橘字=與現行手冊不同。採納後寫入決策紀錄可回溯;也可只參考提案、手動點編現行手冊個別欄位。</div></div>';
 }
 return h;
}
function adoptProposal(tk,src2){
 const d=Store.data,rep=d.aiReports[tk];
 if(!rep||!rep[src2]||!rep[src2].manual)return toast("無此提案");
 if(!confirm("採納 "+src2+" 的 "+tk+" 完整手冊提案?將覆蓋現行手冊(決策紀錄可回溯)"))return;
 d.manual[tk]=d.manual[tk]||{};
 const mm=d.manual[tk],prop=rep[src2].manual;let n=0;
 Object.entries(prop).forEach(([f,v])=>{if(String(mm[f])!==String(v)){Store.log(tk,"手冊/"+f,mm[f],v,"使用者採納 "+src2+" 提案");mm[f]=v;n++;}});
 mm.lastChange=today()+" 使用者採納 "+src2+" 完整提案("+n+" 欄變更)";
 Store.persist();render();toast(tk+" 手冊已更新為 "+src2+" 版本("+n+" 欄變更)");
}

/* ---- Import 解析:三層容錯(dios 圍欄 → json 圍欄 → 全文掃描) ---- */
function tryParse(s){
 s=s.trim();
 try{return JSON.parse(s);}catch(e){}
 try{return JSON.parse(s.replace(/,\s*([}\]])/g,"$1"));}catch(e){} // 修復尾逗號
 return null;
}
function scanJsonObjects(text){ // 全文找含 report_type 的完整 JSON(括號配對)
 const out=[];let i=0;
 while((i=text.indexOf("{",i))!==-1){
  let depth=0,j=i,inStr=false,escp=false,closed=false;
  for(;j<text.length;j++){
   const ch=text[j];
   if(inStr){if(escp)escp=false;else if(ch==="\\")escp=true;else if(ch==='"')inStr=false;}
   else{if(ch==='"')inStr=true;else if(ch==="{")depth++;else if(ch==="}"){depth--;if(depth===0){closed=true;break;}}}
  }
  if(closed){
   const cand=text.slice(i,j+1);
   if(cand.indexOf("report_type")>-1){const o=tryParse(cand);if(o&&o.source&&o.report_type)out.push(o);}
   i=j+1;
  }else i++;
 }
 return out;
}
function extractReports(text){
 const out=[],errs=[];
 // 第一層:```dios 圍欄
 let re=/```dios([\s\S]*?)```/g,m,i=0;
 while((m=re.exec(text))){i++;const o=tryParse(m[1]);if(o&&o.source&&o.report_type)out.push(o);else errs.push("第 "+i+" 個 dios 塊格式錯誤,已嘗試自動修復失敗");}
 // 第二層:```json 或無標記圍欄(一律執行)
 re=/```(?:json)?\s*({[\s\S]*?})\s*```/g;while((m=re.exec(text))){const o=tryParse(m[1]);if(o&&o.source&&o.report_type)out.push(o);}
 // 第三層:全文掃描(圍欄被介面吃掉也能救,一律執行)
 scanJsonObjects(text).forEach(o=>out.push(o));
 // 去重(同來源同類型同日期只留一份)
 const seen={},dedup=[];
 out.forEach(o=>{const k=o.source+"|"+o.report_type+"|"+(o.date||"");seen[k]=o;});
 Object.values(seen).forEach(o=>dedup.push(o));
 if(dedup.length)errs.length=0;
 if(!dedup.length&&!errs.length)errs.push("未找到可解析的報告資料。請確認貼入的內容含有 source 與 report_type 的 JSON(有無 ``` 圍欄皆可)。若 AI 沒輸出 JSON,請回覆它:「請依指令重新輸出,報告末尾必須附上 dios JSON 資料塊」。");
 return {reports:dedup,errs};
}

function buildTodayAction(){

 [...d.positions].sort((a,b)=>(PRI[a.priority]??9)-(PRI[b.priority]??9)).forEach(p=>{

  const repA=d.aiReports[p.ticker]||{};
  const advArr=[...new Set(Object.entries(repA).filter(([,v])=>v.todayAdvice&&v.todayAdvice!=="不動").map(([s2,v])=>s2+": "+v.todayAdvice))];
  const adv=advArr.length?advArr.join(" ｜ "):(d.manual[p.ticker]?d.manual[p.ticker].todayAdvice:null);
  if(c.humanReview)lines.push({t:p.ticker,txt:"⚠ 三 AI 分歧(共識 "+c.pct+"%)→ 到 Decisions 頁裁決。"+c.disagreement});
  else if(c.final&&c.final!=="Hold")lines.push({t:p.ticker,txt:c.final+"(共識 "+c.pct+"%"+(c.resolvedBy?" · 人工裁決":"")+")"+(adv?" — "+adv:"")});
  else if(adv&&adv!=="Hold")lines.push({t:p.ticker,txt:adv});
 });
 if(!lines.length)lines.push({t:"ALL",txt:"全數 Hold,今日不動作、不建倉。"});
 d.todayBoard.action=lines;
}

/* ============ v3.3 決策整合引擎:三 AI 提案自動交叉比對 → 整合版 → 分歧大者才問使用者 ============ */
function primaryNum(v){const m=String(v).match(/\d+(?:\.\d+)?/);return m?parseFloat(m[0]):null;}
function buildIntegration(){
 const d=Store.data;d.integrated=d.integrated||{};d.pendingDecisions=d.pendingDecisions||[];
 // 清掉舊的未裁決項(以最新一輪報告為準重建)
 d.pendingDecisions=d.pendingDecisions.filter(x=>x.resolved);
 const seenT=new Set();
 d.positions.forEach(p=>{const tk=p.ticker;if(seenT.has(tk))return;seenT.add(tk);
  const rep=d.aiReports[tk];if(!rep)return;
  const srcs=Object.keys(rep).filter(s=>rep[s].manual);
  if(!srcs.length)return;
  const latest=Math.max(...srcs.map(s=>+new Date(rep[s].date||0)));
  const integ={date:today(),fields:{},pending:[],applied:null};
  PROP_FIELDS.forEach(([f,label])=>{
   const opts=srcs.map(s=>[s,rep[s].manual[f]]).filter(x=>x[1]!=null);
   if(!opts.length)return;
   const uniq=[...new Set(opts.map(x=>String(x[1]).trim()))];
   if(uniq.length===1){integ.fields[f]={value:opts[0][1],from:opts.map(x=>x[0]).join("+"),how:"三 AI 一致"};return;}
   const nums=opts.map(([s,v])=>[s,v,primaryNum(v)]);
   if(nums.length>=2&&nums.every(x=>x[2]!=null&&x[2]>0)){
    const vals=nums.map(x=>x[2]).sort((a,b)=>a-b);
    const med=vals[Math.floor((vals.length-1)/2)];
    const maxDev=Math.max(...vals.map(v=>Math.abs(v-med)/med*100));
    if(maxDev<5){
     const pick=nums.reduce((a,b)=>Math.abs(b[2]-med)<=Math.abs(a[2]-med)?b:a);
     integ.fields[f]={value:pick[1],from:pick[0],how:"分歧 "+maxDev.toFixed(1)+"% <5%,自動取中位版本"};return;
    }
   }
   integ.pending.push(f);
   const key=tk+"|"+f;
   d.pendingDecisions=d.pendingDecisions.filter(x=>x.key!==key);
   d.pendingDecisions.push({key,ticker:tk,field:f,label,options:opts.map(([s,v])=>({src:s,value:v})),resolved:false,ts:today()});
  });
  // action 分歧(Human Review)也進待決策
  const c=d.consensus[tk];
  if(c&&c.humanReview){
   const key=tk+"|action";
   d.pendingDecisions=d.pendingDecisions.filter(x=>x.key!==key);
   d.pendingDecisions.push({key,ticker:tk,field:"action",label:"Action(共識 "+c.pct+"%)",options:Object.entries(rep).filter(([,v])=>v.action).map(([s,v])=>({src:s,value:v.action,note:v.reason||""})),resolved:false,ts:today()});
  }
  d.integrated[tk]=integ;
 });
}

function resolveDecision(key,choiceIdx){

  value=v.trim();from="使用者手動";if(!value)return;
 }else{const o=item.options[choiceIdx];if(!o)return;value=o.value;from=o.src;}

  const c=d.consensus[item.ticker];
  if(c){Store.log(item.ticker,"Action 裁決",c.final,value,"使用者於 Decisions 頁裁決(採 "+from+")");c.final=value;c.humanReview=false;c.resolvedBy=from;}
  buildTodayAction();
 }else{
  const integ=d.integrated[item.ticker];
  if(integ){integ.fields[item.field]={value,from,how:"使用者裁決"};integ.pending=integ.pending.filter(f=>f!==item.field);}
  Store.log(item.ticker,"提案裁決/"+item.label,"三 AI 分歧",String(value).slice(0,80)+"(採 "+from+")","使用者於 Decisions 頁逐欄位裁決");
 }
 item.resolved=true;item.resolvedValue=value;item.resolvedFrom=from;item.resolvedOn=today();
 Store.persist();render();toast(dispName(item.ticker)+" · "+item.label+" 已裁決");
}

 const total=grand+cashTWD;const alerts=[];
 if(total>0){
  const byTk={};parts.forEach(([p,mv])=>byTk[p.ticker]=(byTk[p.ticker]||0)+mv);
  Object.entries(byTk).forEach(([tk,mv])=>{const p=d.positions.find(x=>x.ticker===tk);const r=mv/total*100;if(r>25&&!(p.sector||"").startsWith("ETF"))alerts.push("單股集中:"+tk+" 佔 "+r.toFixed(1)+"%(>25%)");});

  if(lev/total*100>15)alerts.push("槓桿 ETF 佔 "+(lev/total*100).toFixed(1)+"%(>15%),回檔虧損放大");
  if(cashTWD/total*100<5)alerts.push("現金比例 "+(cashTWD/total*100).toFixed(1)+"%(<5%),無回補子彈");
 }else alerts.push("Data Missing:需現價與匯率(先按 Dashboard 更新報價,現金在此頁填)");
 const target=d.settings.targetAlloc||{};const cur={};

 "你是對帳助理。我會附上券商(國泰證券)的當日成交、庫存明細與帳戶餘額截圖,請你整理成 DIOS 可匯入的 JSON。\n\n"+
 "【規則】\n"+
 "1. 一切以截圖為唯一事實:股數、均價、帳面成本、市價、餘額全部照抄,禁止推算或修改。\n"+
 "2. trades 只列「當日新成交」(截圖成交明細),每筆含日期/帳戶/代碼/名稱/買賣/股數/成交價/成交總額;不要把歷史成交重複列入。\n"+
 "3. holdings 為出現在截圖中之帳戶的【完整庫存清單】——該帳戶未列出的標的會被 DIOS 視為已出清。若截圖只涵蓋部分帳戶,只填該帳戶,其他帳戶完全不要出現在 holdings。\n"+
 "4. 台股名稱照券商全名(如 臻鼎-KY、富邦NASDAQ、群益臺灣加權正2);美股用代號。\n"+
 "5. cash:截圖有餘額才填(twd=台幣交割戶餘額、usd=外幣帳戶餘額),沒有就整個省略;有匯率資訊填 fx_usdtwd,沒有省略。\n"+
 "6. holdings 中的 shares 已反映當日成交,DIOS 匯入時只覆蓋庫存、把 trades 記入歷史,不會重複增減。\n"+
 "7. 帳戶代號:5353959=台股現股(TWD)、L607568=美股台幣複委託(報價USD)、G552118=美股外幣複委託(USD)。\n"+
 "8. 只輸出一個 "+T+"dios JSON 塊,不要其他文字。數字不加千分位逗號。\n\n"+
 "【DIOS 目前庫存(對帳參考,以截圖為準覆蓋)】\n"+JSON.stringify(cur)+"\n\n"+
 "【輸出格式】\n"+T+"dios\n"+JSON.stringify(ex,null,1)+"\n"+T;
}

 return '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">'+FORMAT_DEFS.map(f=>'<button class="chip" style="'+(fmtType===f[0]?'border-color:var(--amber);color:var(--amber)':'')+'" onclick="fmtType=\''+f[0]+'\';render()">'+esc(f[1])+'</button>').join("")+'</div>'+
 '<div class="card"><div class="clabel">▍標準指令(含即時持股快照,直接複製貼給任一 AI)</div><button class="btn" onclick="copyTpl()">一鍵複製</button><pre style="white-space:pre-wrap;font-size:11px;color:var(--dim);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px;max-height:380px;overflow-y:auto;margin-top:8px">'+esc(buildTemplate(fmtType))+'</pre></div>'+

function copyTpl(){navigator.clipboard.writeText(buildTemplate(fmtType)).then(()=>toast("已複製,可貼給 ChatGPT / Claude / Gemini"));}

/* ============ ☁ GitHub Gist 雲端同步(跨裝置)v1.0 ============
   原理:整包 Store.data 存到你 GitHub 帳號的 secret Gist。
   Token / GistID 只存在各裝置 localStorage(dios-sync),永不上傳。
   衝突防護:以雲端 meta.ts 與本機 lastSyncTs 比對,雙邊都變更時要求使用者選擇。 */
const SYNC_KEY="dios-sync", GIST_FILE="dios-data.json";
const Sync={
 cfg:{}, ready:false, suppress:false, timer:null,
 load(){try{this.cfg=JSON.parse(localStorage.getItem(SYNC_KEY))||{};}catch(e){this.cfg={};}if(this.cfg.auto===undefined)this.cfg.auto=true;},
 save(){try{localStorage.setItem(SYNC_KEY,JSON.stringify(this.cfg));}catch(e){}},
 enabled(){return !!this.cfg.token;},
 device(){return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)?"手機":"電腦";},
 headers(){return {"Authorization":"Bearer "+this.cfg.token,"Accept":"application/vnd.github+json","Content-Type":"application/json"};},
 fmtTs(ts){return ts?new Date(ts).toLocaleString("zh-TW",{hour12:false}):"—";},
 refreshChip(){const c=document.getElementById("syncChip");if(!c)return;
  if(!this.enabled()){c.innerHTML="☁ 同步 <b style='color:var(--dimmer)'>未設定</b>";}
  else if(this.cfg.dirty){c.innerHTML="☁ 同步 <b style='color:var(--amber)'>●未上傳</b>";}
  else{c.innerHTML="☁ 同步 <b style='color:#22c55e'>✓</b>";}},
 async discover(){ // 新裝置沒有 gistId 時,自動到帳號裡找含 dios-data.json 的 Gist
  for(let page=1;page<=3;page++){
   const r=await fetch("https://api.github.com/gists?per_page=100&page="+page,{headers:this.headers()});
   if(r.status===401)throw new Error("Token 無效或已過期(401)");
   if(!r.ok)throw new Error("GitHub API 錯誤 "+r.status);
   const list=await r.json();
   if(!list.length)break;
   const hit=list.find(g=>g.files&&g.files[GIST_FILE]);
   if(hit){this.cfg.gistId=hit.id;this.save();toast("☁ 已自動找到雲端資料 Gist");return true;}
   if(list.length<100)break;
  }
  return false;
 },
 async fetchRemote(){ // 回傳 {meta:{ts,device,ver},data:{...}} 或 null
  if(!this.cfg.gistId){if(!this.enabled())return null;const found=await this.discover();if(!found)return null;}
  const r=await fetch("https://api.github.com/gists/"+this.cfg.gistId,{headers:this.headers()});
  if(r.status===404)return null;
  if(r.status===401)throw new Error("Token 無效或已過期(401)");
  if(!r.ok)throw new Error("GitHub API 錯誤 "+r.status);
  const g=await r.json();const f=g.files&&g.files[GIST_FILE];if(!f)return null;
  let content=f.content;
  if(f.truncated){const rr=await fetch(f.raw_url);content=await rr.text();}
  const o=JSON.parse(content);
  return o&&o.meta&&o.data?o:{meta:{ts:0,device:"?"},data:o}; // 容錯:舊格式裸資料
 },
 async push(opts){opts=opts||{};
  if(!this.enabled())return toast("☁ 尚未設定 Token,請按「☁ 同步」設定");
  try{
   if(this.cfg.gistId&&!opts.force){
    const remote=await this.fetchRemote().catch(()=>null);
    if(remote&&remote.meta.ts>(this.cfg.lastSyncTs||0)){
     if(opts.auto){this.refreshChip();return toast("⚠️ 雲端有其他裝置的新資料,已暫停自動上傳。請開啟「☁ 同步」處理");}
     if(!confirm("⚠️ 雲端有更新的資料:\n"+remote.meta.device+" 於 "+this.fmtTs(remote.meta.ts)+" 上傳。\n\n確定要用「本機資料」覆蓋雲端嗎?\n(想改用雲端資料請按取消,再按「⬇ 下載」)"))return;
    }
   }
   const ts=Date.now();
   const payload={meta:{ts,device:this.device(),ver:VERSION},data:Store.data};
   const body={description:"DIOS 資料同步(系統自動產生,勿手動編輯)",files:{}};
   body.files[GIST_FILE]={content:JSON.stringify(payload)};
   let r;
   if(this.cfg.gistId){
    r=await fetch("https://api.github.com/gists/"+this.cfg.gistId,{method:"PATCH",headers:this.headers(),body:JSON.stringify(body)});
    if(r.status===404){this.cfg.gistId=null;this.save();return this.push(opts);} // Gist 被刪→重建
   }else{
    body.public=false;
    r=await fetch("https://api.github.com/gists",{method:"POST",headers:this.headers(),body:JSON.stringify(body)});
   }
   if(r&&r.status===401)throw new Error("Token 無效或已過期,請重新產生");
   if(r&&!r.ok)throw new Error("GitHub API 錯誤 "+r.status);
   if(!r)return;
   const g=await r.json();
   this.cfg.gistId=g.id;this.cfg.lastSyncTs=ts;this.cfg.dirty=false;this.save();this.refreshChip();
   if(!opts.silent)toast("☁ 已上傳雲端("+this.fmtTs(ts)+")");
   const el=document.getElementById("syncStatus");if(el)el.innerHTML=this.statusHtml();
  }catch(e){toast("☁ 上傳失敗:"+e.message);}
 },
 async pull(opts){opts=opts||{};
  if(!this.enabled())return toast("☁ 尚未設定 Token");
  try{
   const remote=await this.fetchRemote();
   if(!remote)return toast("☁ 雲端尚無資料,請先在有資料的裝置按「⬆ 上傳」");
   if(this.cfg.dirty&&!opts.force){
    if(!confirm("⚠️ 本機有尚未上傳的變更。\n下載會用雲端資料("+remote.meta.device+" "+this.fmtTs(remote.meta.ts)+")覆蓋本機。\n\n確定捨棄本機變更、改用雲端資料嗎?"))return;
   }
   this.suppress=true;
   Store.data=migrate(remote.data);
   Store.persist();
   this.suppress=false;
   this.cfg.lastSyncTs=remote.meta.ts;this.cfg.dirty=false;this.save();this.refreshChip();
   render();toast("☁ 已載入雲端資料(來自"+remote.meta.device+" "+this.fmtTs(remote.meta.ts)+")");
  }catch(e){this.suppress=false;toast("☁ 下載失敗:"+e.message);}
 },
 schedule(){clearTimeout(this.timer);this.timer=setTimeout(()=>this.push({auto:true,silent:true}),5000);},
 statusHtml(){
  return '狀態:'+(this.enabled()?(this.cfg.dirty?'<b style="color:var(--amber)">本機有未上傳變更</b>':'<b style="color:#22c55e">已同步</b>'):'<b style="color:var(--dimmer)">未設定</b>')+
   ' · 上次同步:'+this.fmtTs(this.cfg.lastSyncTs)+
   (this.cfg.gistId?' · Gist:'+esc(this.cfg.gistId.slice(0,8))+'…':' · Gist:首次上傳時自動建立');
 },
 async init(){
  this.load();this.refreshChip();
  if(!this.enabled()){this.ready=true;return;}
  try{
   const remote=await this.fetchRemote();
   if(remote&&remote.meta.ts>(this.cfg.lastSyncTs||0)){
    if(!this.cfg.dirty){ // 本機沒動過 → 安全自動載入雲端
     this.suppress=true;Store.data=migrate(remote.data);Store.persist();this.suppress=false;
     this.cfg.lastSyncTs=remote.meta.ts;this.save();this.refreshChip();render();
     toast("☁ 已自動同步雲端最新資料(來自"+remote.meta.device+" "+this.fmtTs(remote.meta.ts)+")");
    }else{
     toast("⚠️ 雲端與本機都有變更!請按「☁ 同步」選擇保留哪一邊");
    }
   }else if(this.cfg.dirty&&this.cfg.auto){this.schedule();} // 上次沒傳完 → 補傳
  }catch(e){toast("☁ 同步檢查失敗:"+e.message);}
  this.ready=true;
 }
};
/* 掛接 Store.persist:資料一變動就標記待上傳,並排程自動上傳 */
const _origPersist=Store.persist.bind(Store);
Store.persist=function(){_origPersist();
 if(Sync.ready&&!Sync.suppress&&Sync.enabled()){Sync.cfg.dirty=true;Sync.save();Sync.refreshChip();if(Sync.cfg.auto)Sync.schedule();}
};
/* 切到背景/關頁前,盡力把未上傳變更送出 */
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden"&&Sync.enabled()&&Sync.cfg.dirty&&Sync.cfg.auto){clearTimeout(Sync.timer);Sync.push({auto:true,silent:true});}});
function openSync(){
 Sync.load();
 const box=document.createElement("div");box.className="modal";box.onclick=e=>{if(e.target===box)box.remove();};
 box.innerHTML='<div class="mbox">'+
  '<div class="clabel" style="color:var(--amber)">☁ 跨裝置雲端同步(GitHub Gist)</div>'+
  '<div class="sub" id="syncStatus" style="margin:6px 0 10px">'+Sync.statusHtml()+'</div>'+
  '<div class="clabel">GitHub Token(classic,只勾 gist 權限)</div>'+
  '<input id="syncToken" type="password" placeholder="'+(Sync.cfg.token?"已設定(留空=不變更)":"ghp_ 開頭的 Token")+'" style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:8px;font-family:ui-monospace,monospace;font-size:12px;margin:4px 0 10px">'+
  '<label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:12px"><input type="checkbox" id="syncAuto" '+(Sync.cfg.auto?"checked":"")+'> 自動同步(開頁自動載入雲端新資料;變更後 5 秒自動上傳)</label>'+
  '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
  '<button class="btn sec" onclick="saveSyncCfg()">儲存設定</button>'+
  '<button class="btn" onclick="Sync.push()">⬆ 上傳(本機→雲端)</button>'+
  '<button class="btn" onclick="Sync.pull()">⬇ 下載(雲端→本機)</button>'+
  '<button class="btn sec" style="margin-left:auto" onclick="this.closest(\'.modal\').remove()">關閉</button>'+
  '</div>'+
  '<div class="sub" style="margin-top:10px;line-height:1.7">'+
  '① 到 github.com/settings/tokens → Generate new token (classic) → 只勾 <b>gist</b> → 產生後貼上。<br>'+
  '② 首次「⬆ 上傳」會自動建立 secret Gist,之後每台裝置貼同一組 Token 即可互通。<br>'+
  '③ Token 只存在本裝置瀏覽器,不會被上傳;若過期重新產生一組貼上即可。'+
  '</div></div>';
 document.body.appendChild(box);
}
function saveSyncCfg(){
 const t=document.getElementById("syncToken").value.trim();
 const a=document.getElementById("syncAuto").checked;
 if(t){
  if(!/^(ghp_|github_pat_)/.test(t)&&!confirm("Token 格式看起來不像 GitHub Token(通常 ghp_ 開頭),仍要儲存嗎?"))return;
  Sync.cfg.token=t;
 }
 Sync.cfg.auto=a;Sync.save();Sync.refreshChip();
 const el=document.getElementById("syncStatus");if(el)el.innerHTML=Sync.statusHtml();
 toast(t?"☁ Token 已儲存於本裝置":"☁ 設定已儲存");
}

Store.load();render();
Sync.init();
</script>
