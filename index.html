function migrate(d){
 const f=freshData(); const out=Object.assign({},f,d);
 out.version=VERSION;
 out.settings=Object.assign({},f.settings,d.settings||{});
 (out.positions||[]).forEach(p=>{
  if(!p.id)p.id=p.ticker+"@"+(p.broker||"預設帳戶");
  if(p.realizedPL===undefined)p.realizedPL=null;
 });
 Object.keys(out.manual||{}).forEach(k=>{const m=out.manual[k];if(m&&m.todayAction!==undefined){m.todayAdvice=m.todayAdvice??m.todayAction;delete m.todayAction;}});
 ["watchlist","aiReports","consensus","consensusHistory","scenarios","metrics","graph","majorEvents","validation","decisionLog","transactions"].forEach(k=>{if(out[k]==null)out[k]=f[k]||[];});
 if(!out.quoteMeta)out.quoteMeta={lastTW:null,quoteDateTW:null,lastFX:null};
 return out;
}

/* ---------- Store ---------- */
const Store={

 load(){try{const r=localStorage.getItem(KEY);this.data=r?migrate(JSON.parse(r)):freshData();}catch(e){this.data=freshData();}this.persist();},
 persist(){try{localStorage.setItem(KEY,JSON.stringify(this.data));}catch(e){toast("儲存失敗:"+e.message);}},
 log(ticker,field,oldVal,newVal,reason){this.data.decisionLog.unshift({ts:now(),ticker,field,oldVal:oldVal==null?"Data Missing":String(oldVal),newVal:newVal==null?"Data Missing":String(newVal),reason:reason||"手動更新"});}
};
const findPos=id=>Store.data.positions.find(x=>x.id===id);

  const p=findPos(id);if(!p)return;
  if(String(p[field])===String(value))return;
  Store.log(p.ticker,field+"("+p.broker+")",p[field],value,reason);
  p[field]=value;p.lastUpdated=today();Store.persist();render();toast(p.ticker+" 已更新並記錄");

   const newAvg=(p.avgCost*p.shares+price*shares)/(p.shares+shares);
   Store.log(p.ticker,"買進("+p.broker+")",p.shares+"股@"+fmt(p.avgCost,4),(p.shares+shares)+"股@"+fmt(newAvg,4),"交易紀錄:買 "+shares+" 股 @ "+price);
   p.shares+=shares;p.avgCost=newAvg;
  }else{
   if(shares>p.shares)return toast("賣出股數超過持有("+p.shares+")");
   const realized=(price-p.avgCost)*shares;tx.realized=Math.round(realized*100)/100;
   p.realizedPL=(p.realizedPL||0)+tx.realized;
   Store.log(p.ticker,"賣出("+p.broker+")",p.shares+"股",(p.shares-shares)+"股,已實現 "+(tx.realized>0?"+":"")+fmt(tx.realized,2)+" "+p.quoteCurrency,"交易紀錄:賣 "+shares+" 股 @ "+price);
   p.shares-=shares; // 均價不變
  }
  p.lastUpdated=today();Store.data.transactions.unshift(tx);Store.persist();render();toast("交易已記錄(Append),成本自動推算");
 },
 applyQuotes(quotes,fxRate,srcName){ // 只更新市價,絕不碰成本
  let n=0,qd=null;
  quotes.forEach(q=>{
   Store.data.positions.filter(x=>x.ticker===q.ticker).forEach(p=>{
    if(q.price!=null&&q.price!==p.currentPrice){Store.log(q.ticker,"現價",p.currentPrice,q.price,srcName+" 報價("+q.date+")");p.currentPrice=q.price;p.lastUpdated=q.date;n++;}
   });
   if(q.date)qd=q.date;
  });
  if(fxRate!=null&&fxRate!==Store.data.settings.fxUSDTWD){Store.log("SYSTEM","USD/TWD",Store.data.settings.fxUSDTWD,fxRate,srcName+" 匯率");Store.data.settings.fxUSDTWD=fxRate;}
  Store.data.quoteMeta.lastTW=now();Store.data.quoteMeta.quoteDateTW=qd;
  if(fxRate!=null)Store.data.quoteMeta.lastFX=now();
  Store.persist();render();return n;
 }
};

const FinMind={
 base:"https://api.finmindtrade.com/api/v4/data",
 async get(params){
  const token=Store.data.settings.finmindToken;
  const u=new URLSearchParams(params);
  const opt=token?{headers:{Authorization:"Bearer "+token}}:{};
  const r=await fetch(this.base+"?"+u.toString(),opt);
  if(!r.ok)throw new Error("HTTP "+r.status);
  return (await r.json()).data||[];
 },
 async twClose(id){
  const start=new Date(Date.now()-14*864e5).toISOString().slice(0,10);
  const rows=await this.get({dataset:"TaiwanStockPrice",data_id:id,start_date:start});
  if(!rows.length)return null;
  const last=rows[rows.length-1];
  return {ticker:id,price:last.close,date:last.date};
 },
 async fxUSD(){
  const start=new Date(Date.now()-14*864e5).toISOString().slice(0,10);
  const rows=await this.get({dataset:"TaiwanExchangeRate",data_id:"USD",start_date:start});
  if(!rows.length)return null;
  const last=rows[rows.length-1];
  const buy=parseFloat(last.spot_buy),sell=parseFloat(last.spot_sell);
  const mid=(buy>0&&sell>0)?(buy+sell)/2:(sell>0?sell:buy);
  return mid>0?Math.round(mid*1000)/1000:null;
 }
};

/* ---------- 計算 ---------- */
function calc(p){
 const fx=Store.data.settings.fxUSDTWD,price=p.currentPrice;
 const mv=price!=null?price*p.shares:null;
 const pl=(price!=null&&p.costCurrency===p.quoteCurrency)?(price-p.avgCost)*p.shares:null;
 const plPct=pl!=null?((price-p.avgCost)/p.avgCost)*100:null;
 const toTWD=v=>v==null?null:(p.quoteCurrency==="TWD"?v:(fx!=null?v*fx:null));
 return {mv,pl,plPct,mvTWD:toTWD(mv),plTWD:toTWD(pl)};
}
function aggregates(){ // 同 ticker 跨帳戶合計
 const g={};
 Store.data.positions.forEach(p=>{
  g[p.ticker]=g[p.ticker]||{ticker:p.ticker,shares:0,cost:0,accts:0};
  g[p.ticker].shares+=p.shares;g[p.ticker].cost+=p.avgCost*p.shares;g[p.ticker].accts++;
 });
 return Object.values(g).filter(x=>x.accts>1).map(x=>({...x,wavg:x.shares>0?x.cost/x.shares:null}));
}

function editFx(){
 const v=prompt("USD/TWD 匯率(也可按報價引擎自動抓)",Store.data.settings.fxUSDTWD??"");
 if(v===null)return;const n=parseFloat(v);if(isNaN(n)){toast("需輸入數字");return;}
 Repo.setSetting("fxUSDTWD",n,"USD/TWD 匯率");
}
function openBackup(){
 const box=document.createElement("div");box.className="modal";box.onclick=e=>{if(e.target===box)box.remove();};
 box.innerHTML='<div class="mbox"><div class="clabel" style="color:var(--amber)">系統備份 JSON(相容 v2/v3 格式)</div><textarea id="iotext" rows="12" style="font-family:ui-monospace,monospace;font-size:11px"></textarea><div style="display:flex;gap:8px;margin-top:10px"><button class="btn sec" onclick="navigator.clipboard.writeText(document.getElementById(\'iotext\').value).then(()=>toast(\'已複製\'))">複製</button><button class="btn" onclick="doImport()">匯入覆蓋</button><button class="btn sec" style="margin-left:auto" onclick="this.closest(\'.modal\').remove()">關閉</button></div><div class="sub" style="margin-top:8px">注意:此版種子已含 2026/07/09 最新持股(4958=40股、LAES 雙帳戶)。若從 v2 匯入舊備份會覆蓋成舊持股,匯入前想清楚。</div></div>';
 document.body.appendChild(box);
 document.getElementById("iotext").value=JSON.stringify(Store.data,null,2);
}
function doImport(){
 const raw=document.getElementById("iotext").value.trim();
 if(raw.toUpperCase()==="RESET"){
  Store.data=freshData();Store.persist();document.querySelector(".modal").remove();render();
  toast("已重置為 2026/07/09 最新持股種子(4958=40股、LAES 雙帳戶)");return;
 }
 try{
  const o=migrate(JSON.parse(raw));
  o.decisionLog.unshift({ts:now(),ticker:"SYSTEM",field:"import",oldVal:"-",newVal:"匯入 "+o.positions.length+" 個部位",reason:"JSON 匯入覆蓋"});
  Store.data=o;Store.persist();document.querySelector(".modal").remove();render();toast("匯入成功");
 }catch(e){toast("JSON 格式錯誤:"+e.message);}
}

Store.load();render();
</script>
</body>
</html>
