<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIOS — FinMind 直連測試</title>
<style>
  body{margin:0;background:#020617;color:#e2e8f0;font-family:ui-monospace,Menlo,monospace;padding:20px}
  .box{max-width:560px;margin:0 auto}
  h1{color:#fbbf24;font-size:16px;letter-spacing:3px}
  p{color:#64748b;font-size:12px;line-height:1.6}
  button{background:#d97706;color:#020617;border:none;border-radius:6px;padding:10px 18px;font-weight:700;font-size:14px;font-family:inherit}
  button:disabled{background:#1e293b;color:#475569}
  #log{margin-top:16px;background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:12px;font-size:12px;min-height:120px;line-height:1.7;word-break:break-all}
  .ok{color:#34d399}.err{color:#fb7185}.big{font-weight:700}.dim{color:#475569;margin-right:8px}
</style>
</head>
<body>
<div class="box">
  <h1>DIOS · FinMind 直連測試</h1>
  <p>測試真實網站(GitHub Pages)能否直接連 FinMind API。用免 token 公開請求查 2330 近期股價。結果決定台股報價要不要經過 Cloudflare Worker。</p>
  <button id="btn" onclick="runTest()">開始測試</button>
  <div id="log"><span class="dim">尚未開始。</span></div>
</div>
<script>
function add(msg, cls){
  const d = document.createElement('div');
  if(cls) d.className = cls;
  d.innerHTML = '<span class="dim">' + new Date().toLocaleTimeString() + '</span>' + msg;
  document.getElementById('log').appendChild(d);
}
async function runTest(){
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  const url = 'https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=2330&start_date=2026-06-25';
  add('目標:api.finmindtrade.com');
  add('送出 GET 請求(無 token,查 2330)…');
  try{
    const t0 = performance.now();
    const resp = await fetch(url);
    const ms = Math.round(performance.now() - t0);
    add('✅ 連線成功!HTTP ' + resp.status + ',耗時 ' + ms + 'ms', 'ok');
    const json = await resp.json();
    const rows = (json && json.data) || [];
    add('✅ 解析成功,共 ' + rows.length + ' 筆', 'ok');
    if(rows.length){
      const last = rows[rows.length - 1];
      add('最後一筆:' + last.date + ' 收盤 ' + last.close, 'ok');
    }
    add('結論:FinMind 可直連 → 台股「一鍵更新報價」不需 Worker(路徑 A 成立)', 'ok big');
  }catch(e){
    add('❌ 失敗:' + e.name + ' — ' + e.message, 'err');
    add('結論:FinMind 未開放瀏覽器直連 → 台股與美股一起走 Cloudflare Worker(路徑 B)', 'err big');
  }finally{
    btn.disabled = false;
  }
}
</script>
</body>
</html>
